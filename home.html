<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♛ Chess Game ♚</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="favicon" rel="icon" type="image/png" href="img/favico.ico">
</head>
<body class="home-page">
    <div class="home-hero">
        <h1 class="home-title">Chess</h1>
        <p class="home-subtitle">Play chess with full rules, move history, statistics, themes, and more.</p>
        
        <div class="menu-buttons">
            <a href="chess.html" class="play-btn">▶ Play Game</a>
            <button id="how-to-play-btn">📖 How to Play</button>
            <button id="settings-btn">⚙ Settings</button>
        </div>

        <div class="home-divider">
            <span>♜ ♞ ♝ ♛ ♚ ♝ ♞ ♜</span>
        </div>


        <div class="features">
            <div class="feature-card">
                <h3>🎨 Themes</h3>
                <p>Classic, Ocean Blue, Wood, and Gray boards.</p>
            </div>

            <div class="feature-card">
                <h3>📊 Statistics</h3>
                <p>Track captures, checks, castles, and promotions.</p>
            </div>

            <div class="feature-card">
                <h3>🔄 Board Controls</h3>
                <p>Flip the board and customize gameplay.</p>
            </div>
        </div>  

        <div class="info-card quote-card">
            <div class="quote-line">
                <span id="quote-text"></span><span class="blink-cursor">|</span>
            </div>
        </div>
    </div>


    <script src="js/home.js"></script>
</body>
</html>
